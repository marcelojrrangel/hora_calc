services:
  - type: web
    name: hora-calc
    runtime: docker
    repo: https://github.com/marcelojrrangel/hora_calc
    plan: free
    envVars:
      - key: HORA_AUTH_PASSWORD_HASH
        sync: false
      - key: HORA_AUTH_BCRYPT_ROUNDS
        value: "12"
      - key: HORA_ENVIRONMENT
        value: production
      - key: HORA_DATA_DIR
        value: data
      - key: HORA_LOG_LEVEL
        value: INFO
      - key: HORA_DAILY_TARGET_MINUTES
        value: "480"
